<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="H26 Central Parade Live Bus Times">
<meta name="theme-color" content="#000000">

<!-- PWA Meta Tags -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="H26">

<!-- Icons -->
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">

<!-- iOS Splash Screen (iPad) -->
<link rel="apple-touch-startup-image" href="icon.png" media="(device-width: 1024px) and (device-height: 1366px)">

<title>H26 Live</title>

<style>
body{
    margin:0;
    height:100vh;
    background:black;
    color:white;
    font-family:Arial;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    text-align:center;
}

/* Header scales with screen */
.header{
    font-size:clamp(16px, 3vw, 32px);
    opacity:0.7;
    letter-spacing:1px;
    padding:0 10px;
}

/* Main arrival time scales properly */
.time{
    font-size:clamp(60px, 18vw, 160px);
    font-weight:bold;
    margin-top:10px;
    line-height:1;
}

/* DUE animation stays same but works better on all sizes */
.due {
    animation: flash 1s infinite;
    color:red;
}

@keyframes flash {
    0% {opacity:1;}
    50% {opacity:0.2;}
    100% {opacity:1;}
}

/* Prevent overflow issues on very small screens */
* {
    box-sizing:border-box;
}
</style>
</head>

<body>

<div class="header">H26  Central Parade</div>
<div id="time" class="time">--</div>

<script>

const stopID = "490004927N";

// latest bus time (in seconds)
let currentSeconds = null;

// last API sync
let lastFetch = 0;

// fetch from TfL (slow layer)
async function fetchBusData(){
    try{
        const res = await fetch(`https://api.tfl.gov.uk/StopPoint/${stopID}/Arrivals`);
        const data = await res.json();

        let h26 = data.filter(b => b.lineName === "H26");
        if(h26.length === 0) return;

        h26.sort((a,b) => a.timeToStation - b.timeToStation);

        currentSeconds = h26[0].timeToStation;

    } catch(e){
        console.log("API error");
    }
}

// display updater (FAST layer)
function updateDisplay(){

    if(currentSeconds === null){
        document.getElementById("time").innerText = "LOADING";
        return;
    }

    let mins = Math.floor(currentSeconds / 60);
    let secs = currentSeconds % 60;

    let el = document.getElementById("time");

    if(currentSeconds <= 30){
        el.innerText = "DUE";
        el.classList.add("due");
    } else {
        el.innerText = mins + " min";
        el.classList.remove("due");
    }

    // simulate countdown locally (makes it feel live)
    currentSeconds = Math.max(0, currentSeconds - 1);
}

// initial fetch
fetchBusData();

// refresh API every 20 seconds
setInterval(fetchBusData, 20000);

// smooth UI update every 1 second
setInterval(updateDisplay, 1000);

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
